name: macOS - UI Tests

defaults:
  run:
    working-directory: macOS

on:
  workflow_dispatch:
    inputs:
      all_os_versions:
        description: "Test all supported macOS versions (not just the latest)"
        type: boolean
        default: true
      single_test_class:
        description: "Run one or more UITestCases (optional, space-separated, e.g. 'AutocompleteTests' or 'AutocompleteTests BookmarksTests')"
        type: string
        required: false
  workflow_call:
    inputs:
      all_os_versions:
        description: "Test all supported macOS versions (not just the latest)"
        type: boolean
        default: true
      branch:
        description: "Branch name"
        required: false
        type: string
      single_test_class:
        description: "Run one or more UITestCases (optional, space-separated, e.g. 'AutocompleteTests' or 'AutocompleteTests BookmarksTests')"
        type: string
        required: false
  schedule:
    - cron: '0 3 * * 1-5' # 3AM UTC offsetted to legacy to avoid action-junit-report@v4 bug
  push:
    branches: [ main, "release/macos/**", "hotfix/macos/**" ]
    paths:
      - 'SharedPackages/BrowserServicesKit/**'
      - 'macOS/**'
  pull_request:
    # opened, synchronize, reopened are the default triggering events for a pull request
    # We're also adding ready_for_review to run checks when a draft PR becomes ready for review.
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/**'
      - '.xcode-version'
      - 'SharedPackages/BrowserServicesKit/Package.swift'

concurrency:
  # When this workflow is called by another workflow (e.g. code freeze), `github.workflow` contains the name of the calling workflow,
  # and the value of `${{ github.workflow }}-${{ github.ref }}` would be the same for PR Checks and UI Tests, which would prevent them
  # from being run concurrently. We're adding a suffix here to tell PR Checks and UI Tests apart and allow for running the two
  # side by side in the code freeze workflow.
  group: ${{ github.workflow }}-${{ github.ref }}-ui-tests
  cancel-in-progress: true

jobs:
  should-run-checks:
    name: Determine if checks should run
    uses: ./.github/workflows/should_run_pr_checks.yml

  create-notarized-app:
    name: Build Notarized Review app

    needs: should-run-checks
    if: needs.should-run-checks.outputs.should_run == 'true'

    uses: ./.github/workflows/macos_build_notarized.yml
    with:
      release-type: review
      create-dmg: false
      branch: ${{ inputs.branch || github.sha }}
      skip-notify: true
    secrets: inherit

  # This job sets up the matrix strategy arguments for the ui-tests job
  setup-tests:
    name: Set up tests list
    runs-on: macos-26

    needs: should-run-checks
    if: needs.should-run-checks.outputs.should_run == 'true'

    outputs:
      runner: ${{ steps.define-runners.outputs.runner }}
      include: ${{ steps.define-runners.outputs.include }}
      test: ${{ steps.list-tests.outputs.test }}
      all-os-versions: ${{ steps.define-runners.outputs.all-os-versions }}
      start-timestamp: ${{ steps.start-duration.outputs.start-timestamp }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.sha }}

      - name: Start measuring duration
        id: start-duration
        uses: ./.github/actions/measure-duration
        with:
          mode: start

      - name: Define runners
        id: define-runners
        run: |
          # scheduled runs don't have inputs so let's default to true for all_os_versions
          all_os_versions="${{ inputs.all_os_versions || 'true' }}"
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "push" || "$all_os_versions" == "false" ]]; then
            all_os_versions='false'
            runner='["macos-26-xlarge"]'
            include='[{"runner": "macos-26-xlarge", "os-version": "26", "xcode-version": "26.2"}]'
          else
            all_os_versions='true'
            runner='["macos-14-xlarge", "macos-15-xlarge", "macos-26-xlarge"]'
            include=$(jq -c <<< '[
              {"runner": "macos-14-xlarge", "os-version": "14", "xcode-version": "15.4"},
              {"runner": "macos-15-xlarge", "os-version": "15", "xcode-version": "26.2"},
              {"runner": "macos-26-xlarge", "os-version": "26", "xcode-version": "26.2"}
            ]')
          fi
          echo "all-os-versions=${all_os_versions}" >> $GITHUB_OUTPUT
          echo "runner=${runner}" >> $GITHUB_OUTPUT
          echo "include=${include}" >> $GITHUB_OUTPUT

      - name: List tests
        id: list-tests
        run: |
          # Check if one or more test classes were specified
          single_test_class="${{ inputs.single_test_class }}"

          if [[ -n "$single_test_class" ]]; then
            echo "Running specified test class(es): $single_test_class"
            test=$(echo $single_test_class | jq -cR 'split(" ")')
          else
            # Find all test classes that inherit from UITestCase
            # Fail if any test classes inherit directly from XCTestCase

            # Check for invalid XCTestCase usage (classes inheriting from XCTestCase but not UITestCase)
            xctest_classes=$(grep -r "class.*:.*XCTestCase" UITests --include="*.swift" | grep -v "class UITestCase:" || true)
            if [[ -n "$xctest_classes" ]]; then
              echo "❌ Error: Found test classes inheriting directly from XCTestCase instead of UITestCase:"
              echo "$xctest_classes"
              echo ""
              echo "All test classes should inherit from UITestCase, not XCTestCase."
              exit 1
            fi

            # Extract test class names that inherit from UITestCase
            test_names=$(grep -rh "class.*:.*UITestCase" UITests --include="*.swift" \
              | sed -E 's/^[^c]*class[[:space:]]+([A-Za-z0-9_]+)[[:space:]]*:.*/\1/' \
              | sort -u \
              | tr '\n' ' ')

            if [[ -z "$test_names" ]]; then
              echo "❌ Error: No UITestCase-derived test classes found"
              exit 1
            fi

            test=$(echo $test_names | jq -cR 'split(" ") | map(select(length > 0))')
            echo "Found test classes: $test_names"
          fi

          echo "test=${test}" >> $GITHUB_OUTPUT

  ui-tests:
    name: ${{ matrix.test }} (macOS ${{ matrix.os-version }})
    needs: [create-notarized-app, setup-tests]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.setup-tests.outputs.runner) }}
        test: ${{ fromJSON(needs.setup-tests.outputs.test) }}
        include: ${{ fromJSON(needs.setup-tests.outputs.include) }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.runner }}-${{ matrix.test }}
      cancel-in-progress: true

    timeout-minutes: 120

    steps:
    - name: Register SSH keys for private repos
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: |
          ${{ secrets.SSH_PRIVATE_KEY_FASTLANE_MATCH }}
          ${{ secrets.SSH_PRIVATE_KEY_DUCKSANS_FONT }}

    - name: Check out the code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        ref: ${{ inputs.branch || github.sha }}

    - name: Install screenresolution
      if: matrix.os-version != '14'
      run: brew install screenresolution

    - name: Change screen resolution
      if: matrix.os-version != '14'
      run: screenresolution set 1920x1080x32@60

    - name: Setup Ruby and dependencies
      uses: ./.github/actions/setup-ruby
      with:
        working-directory: macOS
        cache-key-prefix: macos-ruby

    - name: Create Default Keychain
      run: bundle exec fastlane create_keychain_ui_tests

    - name: Sync code signing assets
      id: sync-signing-first-attempt
      continue-on-error: true
      env:
        APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        SSH_PRIVATE_KEY_FASTLANE_MATCH: ${{ secrets.SSH_PRIVATE_KEY_FASTLANE_MATCH }}
      run: |
        bundle exec fastlane sync_signing_ci

    - name: Retry sync code signing assets
      if: steps.sync-signing-first-attempt.outcome == 'failure'
      env:
        APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
        MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        SSH_PRIVATE_KEY_FASTLANE_MATCH: ${{ secrets.SSH_PRIVATE_KEY_FASTLANE_MATCH }}
      run: |
        echo "First attempt to sync code signing assets failed. Retrying..."
        bundle exec fastlane sync_signing_ci

    - name: Download and unzip artifact
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        max_attempts=5
        retry_delay=10

        for attempt in $(seq 1 $max_attempts); do
          echo "Attempt $attempt of $max_attempts"
          rm -rf build-download-temp
          mkdir build-download-temp
          if gh run download "${{ github.run_id }}" --dir build-download-temp; then
            echo "Download successful"
            mv build-download-temp/* .
            rm -rf build-download-temp
            exit 0
          fi
          rm -rf build-download-temp
          if [[ $attempt -lt $max_attempts ]]; then
            echo "Download failed, retrying in ${retry_delay}s..."
            sleep $retry_delay
          fi
        done
        echo "All download attempts failed"
        exit 1

    - name: Set cache key hash
      run: |
        has_only_tags=$(jq '[ .pins[].state | has("version") ] | all' DuckDuckGo-macOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved)
        if [[ "$has_only_tags" == "true" ]]; then
          echo "cache_key_hash=${{ hashFiles('macOS/DuckDuckGo-macOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}" >> $GITHUB_ENV
        else
          echo "Package.resolved contains dependencies specified by branch or commit, skipping cache."
        fi

    - name: Cache SPM
      if: env.cache_key_hash
      uses: actions/cache@v4
      with:
        path: macOS/DerivedData/SourcePackages
        key: ${{ runner.os }}-macos-${{ env.cache_key_hash }}
        restore-keys: |
          ${{ runner.os }}-macos-

    - name: Select Xcode
      uses: ./.github/actions/select-xcode-version
      with:
        xcode-version: ${{ matrix.xcode-version }}

    - name: Configure system logging
      working-directory: SharedPackages/BrowserServicesKit
      run: |
        sudo cp com.apple.system.logging.plist /Library/Preferences/Logging/com.apple.system.logging.plist
        sudo killall logd || true

    - name: Start log stream in background
      working-directory: macOS
      run: |
        log stream --debug --info --predicate 'process == "DuckDuckGo Review" OR process == "UI Tests-Runner"' --style syslog > app-console.log 2>&1 &
        echo $! > log_stream.pid

    - name: Resolve package dependencies
      working-directory: macOS
      run: |
        max_attempts=5
        retry_delay=10

        for attempt in $(seq 1 $max_attempts); do
          echo "Attempt $attempt of $max_attempts"
          if xcodebuild -resolvePackageDependencies \
            -scheme "macOS UI Tests CI" \
            -derivedDataPath DerivedData \
            2>&1 | tee resolve.log; then
            echo "Package resolution succeeded"
            exit 0
          fi

          if [[ $attempt -lt $max_attempts ]]; then
            echo "Package resolution failed (attempt $attempt), retrying in ${retry_delay}s..."
            sleep $retry_delay
          fi
        done
        echo "Package resolution failed after $max_attempts attempts"
        exit 1

    - name: Build for testing
      working-directory: macOS
      run: |
        set -o pipefail && xcodebuild build-for-testing \
          -scheme "macOS UI Tests CI" \
          -derivedDataPath DerivedData \
          -skipPackagePluginValidation \
          -skipMacroValidation \
        | tee xcodebuild.log \
        | xcbeautify

    - name: Extract and Copy app to /DerivedData
      working-directory: macOS
      run: |
        cd DuckDuckGo-review-*.app.tar.xz && tar -xf DuckDuckGo-*.app.tar.xz

        # Find the extracted app bundle and rename if needed
        extracted_app=$(find . -maxdepth 1 -name "*.app" -type d | head -1)
        if [[ -n "${extracted_app}" ]]; then
          extracted_app_name=$(basename "${extracted_app}")
          if [[ "${extracted_app_name}" != "DuckDuckGo Review.app" ]]; then
            echo "Renaming extracted app from '${extracted_app_name}' to 'DuckDuckGo Review.app'"
            mv "${extracted_app}" "DuckDuckGo Review.app"
          fi
        fi

        mv -f "DuckDuckGo Review.app" "../DerivedData/Build/Products/Review/DuckDuckGo Review.app"

    - name: Run UI Tests
      id: run-ui-tests
      working-directory: macOS
      run: |
        defaults write com.duckduckgo.macos.browser.review moveToApplicationsFolderAlertSuppress 1
        set -o pipefail && xcodebuild test-without-building \
          -scheme "macOS UI Tests CI" \
          -derivedDataPath DerivedData \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          -test-iterations 2 \
          -retry-tests-on-failure \
          -test-repetition-relaunch-enabled YES \
          '-only-testing:UI Tests/${{ matrix.test }}' \
        | tee -a xcodebuild.log \
        | tee ui-tests.log

    - name: Stop log stream
      if: always()
      working-directory: macOS
      run: |
        if [ -f log_stream.pid ]; then
          kill $(cat log_stream.pid) || true
        fi

    - name: Check for test failures
      id: check-failures
      if: always()
      working-directory: macOS
      run: |
        if grep -Eq 'XCTAssert.*failed|Test Case.*failed|Testing failed:' ui-tests.log; then
          echo "had_failures=true" >> $GITHUB_OUTPUT
          echo "⚠️ Detected test failures in the log (may have passed on retry)"
        else
          echo "had_failures=false" >> $GITHUB_OUTPUT
        fi

    - name: Prepare test report
      id: prepare-test-report
      if: always()
      working-directory: macOS
      run: |
        test_id="${{ matrix.test }} (macOS ${{ matrix.os-version }})"
        file="${test_id}.xml"
        echo "file=$file" >> $GITHUB_OUTPUT
        xcbeautify --report junit --report-path . --junit-report-filename "$file" < ui-tests.log
        # Replace the default test suite name with the test id for better grouping in the test report
        sed -i '' "s/Selected tests/${test_id}/" "$file"

    # Upload test report as artifact for the test-report job
    # that publishes a combined report for all test cases
    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: "testreport-${{ matrix.test }}-macos${{ matrix.os-version }}"
        path: "macOS/${{ steps.prepare-test-report.outputs.file }}"
        retention-days: 1

    - name: Upload xcresult files (passed on retry)
      uses: actions/upload-artifact@v4
      if: always() && steps.check-failures.outputs.had_failures == 'true' && steps.run-ui-tests.outcome == 'success'
      with:
        name: "xcresult-${{ matrix.test }}-macos${{ matrix.os-version }}"
        path: "macOS/DerivedData/Logs/Test/*.xcresult"
        retention-days: 1

    - name: Upload app console log (passed on retry)
      uses: actions/upload-artifact@v4
      if: always() && steps.check-failures.outputs.had_failures == 'true' && steps.run-ui-tests.outcome == 'success'
      with:
        name: "app-console-${{ matrix.test }}-macos${{ matrix.os-version }}"
        path: "macOS/app-console.log"
        if-no-files-found: warn
        retention-days: 1

    - name: Organize logs for upload
      if: failure() || cancelled()
      working-directory: macOS
      run: |
        echo "Current working directory: $(pwd)"

        # Create staging directory with timestamp, OS version and failing test name
        timestamp=$(date +"%Y-%m-%d_%H-%M-%S")
        archive_name="BuildLogs ${{ matrix.test }} (macOS ${{ matrix.os-version }}) ${timestamp}"
        echo "Creating archive directory: $archive_name"
        mkdir -p "$archive_name"

        # locate and copy all files, flattening the structure with verbose output
        cp "xcodebuild.log" "$archive_name/" || echo "No xcodebuild.log found"
        cp "app-console.log" "$archive_name/" || echo "No app-console.log found"
        find DerivedData/Logs/Test -name "*.xcresult" -print -exec cp -rf {} "$archive_name/" \; 2>&1 || echo "No .xcresult files found"
        cp -rf ~/Library/Logs/DiagnosticReports "$archive_name/" || echo "No DiagnosticReports found"

        # Store archive name for upload step
        echo "ARCHIVE_NAME=$archive_name" >> $GITHUB_ENV

    - name: Upload logs when workflow failed
      uses: actions/upload-artifact@v4
      if: failure() || cancelled()
      with:
        name: "${{ env.ARCHIVE_NAME }}"
        path: "macOS/${{ env.ARCHIVE_NAME }}"
        retention-days: 7

  test-report:
    name: Report test results
    if: always() && needs.should-run-checks.outputs.should_run == 'true'
    needs: [should-run-checks, setup-tests, ui-tests]
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch || github.sha }}

    - name: Download test reports
      uses: actions/download-artifact@v4
      if: always()
      with:
        pattern: "testreport-*"
        merge-multiple: true

    - name: Publish tests report
      uses: mikepenz/action-junit-report@v5
      if: always()
      with:
        check_name: Tests Report
        report_paths: "*.xml"
        check_retries: true
        group_reports: false
        flaky_summary: true
        verbose_summary: false
        include_time_in_summary: true
        skip_annotations: true

    - name: Report workflow duration
      continue-on-error: true
      uses: ./.github/actions/measure-duration
      with:
        mode: stop
        start-timestamp: ${{ needs.setup-tests.outputs.start-timestamp }}
        pixel-name: ${{ (needs.setup-tests.outputs.all-os-versions == true) && 'm_ci_apple_duration_macos_ui_tests_all' || 'm_ci_apple_duration_macos_ui_tests_latest' }}

  notify-failure:
    name: Notify on failure
    if: ${{ always() && github.event_name == 'schedule' && (needs.ui-tests.result == 'failure' || needs.ui-tests.result == 'cancelled') }}
    needs: [ui-tests]
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch || github.sha }}

    - name: Create Asana task when workflow failed
      uses: duckduckgo/native-github-asana-sync@v1.1
      with:
        action: create-asana-task
        asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
        asana-project: ${{ vars.MACOS_APP_DEVELOPMENT_ASANA_PROJECT_ID }}
        asana-task-name: GH Workflow Failure - UI Tests
        asana-task-description: The UI Tests workflow has failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
